<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="brand-assets/movirte-favicon-small.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — MOVIRTE</title>
    <meta name="description" content="Sign in to your MOVIRTE account.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --movirte-brown: rgb(59, 31, 16);
            --movirte-ink: #111;
            --movirte-bg: #f3f1e7;
            --movirte-muted: rgba(17, 17, 17, 0.6);
            --movirte-border: rgba(0, 0, 0, 0.08);
        }

        html,
        body {
            height: 100%;
        }

        body {
            margin: 0;
            background: var(--movirte-bg);
            color: var(--movirte-ink);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        .signin-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .signin-main {
            flex: 1;
            display: grid;
            place-items: center;
            padding: 72px 20px 44px;
        }

        .signin-card {
            width: min(360px, 100%);
            background: #fff;
            border: 1px solid var(--movirte-border);
            border-radius: 10px;
            padding: 28px 26px 22px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
        }

        .signin-brand {
            text-align: center;
            margin-bottom: 18px;
            font-family: "Playfair Display", serif;
        }

        .signin-brand .wordmark {
            margin: 0;
            font-size: 0.66rem;
            letter-spacing: 0.26em;
            text-transform: uppercase;
            font-weight: 600;
        }

        .signin-brand .city {
            margin-top: 4px;
            font-size: 0.5rem;
            letter-spacing: 0.24em;
            text-transform: uppercase;
            color: rgba(17, 17, 17, 0.55);
        }

        .signin-title {
            margin: 0;
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 0.01em;
        }

        .signin-subtitle {
            margin: 6px 0 16px;
            font-size: 0.72rem;
            color: var(--movirte-muted);
        }

        .btn {
            width: 100%;
            border: 1px solid transparent;
            border-radius: 8px;
            padding: 12px 14px;
            font-size: 0.72rem;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            transition: filter 0.15s ease, background 0.15s ease, border-color 0.15s ease;
        }

        .btn-shop {
            background: var(--movirte-brown);
            color: #fff;
        }

        .btn-shop:hover {
            filter: brightness(1.08);
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 14px 0;
            color: rgba(17, 17, 17, 0.45);
            font-size: 0.62rem;
        }

        .divider::before,
        .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: rgba(0, 0, 0, 0.08);
        }

        .field {
            width: 100%;
            border: 1px solid rgba(0, 0, 0, 0.10);
            border-radius: 8px;
            padding: 12px 12px;
            font-size: 0.72rem;
            outline: none;
            box-sizing: border-box;
        }

        .field:focus {
            border-color: rgba(17, 17, 17, 0.4);
        }

        .btn-continue {
            margin-top: 10px;
            background: #6b6a57;
            border-color: #6b6a57;
            color: #fff;
        }

        .btn-continue:hover {
            filter: brightness(1.06);
        }

        .signin-footer {
            padding: 18px 20px 22px;
            text-align: center;
            font-size: 0.62rem;
            color: rgba(17, 17, 17, 0.55);
        }

        .signin-footer a {
            color: inherit;
            text-decoration: none;
            margin: 0 10px;
        }

        .signin-footer a:hover {
            text-decoration: underline;
            text-underline-offset: 3px;
        }
    </style>
    <link rel="stylesheet" href="assets/css/responsive-global.css">
</head>

<body>
    <div class="signin-page">
        <main class="signin-main">
            <section class="signin-card" aria-label="Sign in">
                <div class="signin-brand" aria-hidden="true">
                    <p class="wordmark">MOVIRTE</p>
                    <div class="city">London</div>
                </div>

                <h1 class="signin-title">Sign in</h1>
                <p class="signin-subtitle">Sign in or create an account</p>

                <a class="btn btn-shop" href="shop.html">Continue with shop</a>

                <div class="divider" aria-hidden="true">or</div>

                <form action="#" method="post">
                    <input class="field" type="email" name="email" placeholder="Email" autocomplete="email" required>
                    <button class="btn btn-continue" type="submit">Continue</button>
                </form>
            </section>
        </main>

        <footer class="signin-footer">
            <a href="privacy-policy.html">Privacy policy</a>
            <a href="terms-of-service.html">Terms of service</a>
        </footer>
    </div>
</body>

</html>
